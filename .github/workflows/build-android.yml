name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "app/**"
      - "index.html"
      - "styles.css"
      - "app.js"
      - "build.gradle"
      - "settings.gradle"
      - ".github/workflows/build-android.yml"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.7"

      - name: Build debug APK
        run: gradle assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: classflow-debug-apk
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK to GitHub Pages
        if: github.ref == 'refs/heads/main'
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk /tmp/classflow-debug.apk
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin gh-pages
          git checkout gh-pages
          mkdir -p downloads
          cp /tmp/classflow-debug.apk downloads/classflow-debug.apk
          git add downloads/classflow-debug.apk
          git commit -m "Publish Android APK" || exit 0
          git push origin gh-pages
